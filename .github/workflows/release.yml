name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    env:
      HAS_CERTIFICATES: ${{ secrets.CERTIFICATES_P12 != '' }}

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Xcode
      uses: maxim-lobanov/setup-xcode@v1
      with:
        xcode-version: latest-stable

    - name: Extract version from tag
      id: get_version
      run: |
        if [[ $GITHUB_REF == refs/tags/* ]]; then
          VERSION=${GITHUB_REF#refs/tags/}
          VERSION=${VERSION#v}
        else
          VERSION=$(git describe --tags --always 2>/dev/null || echo "dev")
        fi
        echo "version=$VERSION" >> $GITHUB_OUTPUT
        echo "Version: $VERSION"

    - name: Import Code Signing Certificate
      if: env.HAS_CERTIFICATES == 'true'
      env:
        CERTIFICATES_P12: ${{ secrets.CERTIFICATES_P12 }}
        CERTIFICATES_PASSWORD: ${{ secrets.CERTIFICATES_PASSWORD }}
      run: |
        KEYCHAIN_PATH=$RUNNER_TEMP/build.keychain
        KEYCHAIN_PASSWORD=$(openssl rand -base64 32)

        security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
        security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
        security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

        echo "$CERTIFICATES_P12" | base64 --decode > certificate.p12
        security import certificate.p12 \
          -k "$KEYCHAIN_PATH" \
          -P "$CERTIFICATES_PASSWORD" \
          -T /usr/bin/codesign \
          -T /usr/bin/productsign

        security list-keychain -d user -s "$KEYCHAIN_PATH"
        security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
        rm certificate.p12

        # Find the imported signing identity
        IDENTITY=$(security find-identity -v -p codesigning "$KEYCHAIN_PATH" | head -1 | sed -E 's/.*"(.*)"/\1/')
        echo "SIGNING_IDENTITY=$IDENTITY" >> $GITHUB_ENV
        echo "Using identity: $IDENTITY"

    - name: Build and Archive
      run: |
        SIGN_IDENTITY="${SIGNING_IDENTITY:--}"
        echo "Building with signing identity: $SIGN_IDENTITY"
        xcodebuild \
          -project Flycut.xcodeproj \
          -scheme Flycut \
          -configuration Release \
          -archivePath build/Flycut.xcarchive \
          archive \
          CODE_SIGN_IDENTITY="$SIGN_IDENTITY" \
          CODE_SIGN_STYLE=Manual \
          DEVELOPMENT_TEAM=""

    - name: Export App
      run: |
        mkdir -p build/Export
        cp -R build/Flycut.xcarchive/Products/Applications/Flycut.app build/Export/

    - name: Verify Code Signing
      run: |
        echo "=== Code signature ==="
        codesign -dv --verbose=2 build/Export/Flycut.app
        echo ""
        codesign --verify --verbose build/Export/Flycut.app

    - name: Create DMG
      run: |
        mkdir -p build/dmg-staging
        cp -R build/Export/Flycut.app build/dmg-staging/
        ln -s /Applications build/dmg-staging/Applications

        DMG_PATH="$(pwd)/build/Flycut.dmg"

        hdiutil create \
          -volname "Flycut" \
          -srcfolder build/dmg-staging \
          -ov \
          -format UDZO \
          "$DMG_PATH"

        ls -lh "$DMG_PATH"

    - name: Clean up keychain
      if: always()
      run: |
        security delete-keychain "$RUNNER_TEMP/build.keychain" 2>/dev/null || true

    - name: Generate Release Notes
      run: |
        PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")

        if [ -z "$PREV_TAG" ]; then
          COMMITS=$(git log --pretty=format:"- %s (%h)" --reverse)
        else
          COMMITS=$(git log ${PREV_TAG}..HEAD --pretty=format:"- %s (%h)" --reverse)
        fi

        if [ -n "$SIGNING_IDENTITY" ]; then
          SIGNED_STATUS="signed ($SIGNING_IDENTITY)"
        else
          SIGNED_STATUS="ad-hoc signed"
        fi

        cat > release_notes.md <<EOF
        ## Changes in this release

        $COMMITS

        ## Installation

        1. Download the DMG file below
        2. Open the DMG and drag Flycut.app to Applications
        3. Launch Flycut
        4. Grant Accessibility permission when prompted (System Settings > Privacy & Security > Accessibility)

        **Upgrading?** If paste stops working after updating, reset the accessibility permission:
        \`\`\`
        tccutil reset Accessibility com.generalarcade.flycut
        \`\`\`
        Then re-grant permission to Flycut and restart the app.

        ## Build Info

        - Signing: $SIGNED_STATUS
        - Requires: macOS 13.5+
        EOF

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v1
      with:
        files: build/Flycut.dmg
        body_path: release_notes.md
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Upload Build Artifacts
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: build-artifacts
        path: |
          build/
          !build/dmg-staging/
        retention-days: 7
