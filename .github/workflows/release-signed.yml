name: Build and Release (Code Signed)

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Xcode
      uses: maxim-lobanov/setup-xcode@v1
      with:
        xcode-version: latest-stable

    - name: Verify System Tools
      run: |
        echo "=== System Information ==="
        sw_vers
        echo ""
        echo "=== Checking for hdiutil ==="
        which hdiutil || echo "hdiutil not found in PATH"
        hdiutil --version || echo "hdiutil command failed"
        echo ""
        echo "=== Checking for other DMG tools ==="
        which create-dmg || echo "create-dmg not found"
        echo ""
        echo "=== Current PATH ==="
        echo $PATH
        echo ""
        echo "=== Available disk utilities ==="
        ls -la /usr/bin/*disk* || true
        ls -la /usr/bin/hdiutil || true

    - name: Extract version from tag
      id: get_version
      run: |
        if [[ $GITHUB_REF == refs/tags/* ]]; then
          VERSION=${GITHUB_REF#refs/tags/}
          VERSION=${VERSION#v}  # Remove 'v' prefix if present
        else
          VERSION=$(git describe --tags --always 2>/dev/null || echo "dev")
        fi
        echo "version=$VERSION" >> $GITHUB_OUTPUT
        echo "Version: $VERSION"
        echo "GITHUB_REF: $GITHUB_REF"

    - name: Check for signing certificates
      id: check_secrets
      run: |
        if [ -n "${{ secrets.CERTIFICATES_P12 }}" ]; then
          echo "has_certs=true" >> $GITHUB_OUTPUT
        else
          echo "has_certs=false" >> $GITHUB_OUTPUT
        fi
        if [ -n "${{ secrets.NOTARIZATION_PASSWORD }}" ]; then
          echo "has_notarization=true" >> $GITHUB_OUTPUT
        else
          echo "has_notarization=false" >> $GITHUB_OUTPUT
        fi

    - name: Import Code Signing Certificates
      if: steps.check_secrets.outputs.has_certs == 'true'
      env:
        CERTIFICATES_P12: ${{ secrets.CERTIFICATES_P12 }}
        CERTIFICATES_PASSWORD: ${{ secrets.CERTIFICATES_PASSWORD }}
      run: |
        # Create temporary keychain
        KEYCHAIN_PATH=$RUNNER_TEMP/build.keychain
        KEYCHAIN_PASSWORD=$(openssl rand -base64 32)

        security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
        security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
        security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

        # Import certificate
        echo "$CERTIFICATES_P12" | base64 --decode > certificate.p12
        security import certificate.p12 \
          -k "$KEYCHAIN_PATH" \
          -P "$CERTIFICATES_PASSWORD" \
          -T /usr/bin/codesign \
          -T /usr/bin/productsign

        security list-keychain -d user -s "$KEYCHAIN_PATH"
        security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

        rm certificate.p12

        # Find and set signing identity
        IDENTITY=$(security find-identity -v -p codesigning "$KEYCHAIN_PATH" | grep "Developer ID Application" | head -1 | sed -E 's/.*"(.*)"/\1/')
        echo "SIGNING_IDENTITY=$IDENTITY" >> $GITHUB_ENV
        echo "Using identity: $IDENTITY"

    - name: List available schemes
      run: xcodebuild -list -project Flycut.xcodeproj

    - name: Build and Archive (Signed)
      if: steps.check_secrets.outputs.has_certs == 'true'
      run: |
        xcodebuild \
          -project Flycut.xcodeproj \
          -scheme Flycut \
          -configuration Release \
          -archivePath build/Flycut.xcarchive \
          archive \
          CODE_SIGN_IDENTITY="$SIGNING_IDENTITY" \
          CODE_SIGN_STYLE=Manual

    - name: Build and Archive (Unsigned)
      if: steps.check_secrets.outputs.has_certs != 'true'
      run: |
        echo "Building without code signing (no certificates provided)"
        xcodebuild \
          -project Flycut.xcodeproj \
          -scheme Flycut \
          -configuration Release \
          -archivePath build/Flycut.xcarchive \
          archive \
          CODE_SIGN_IDENTITY="" \
          CODE_SIGNING_REQUIRED=NO \
          CODE_SIGNING_ALLOWED=NO

    - name: Export App
      run: |
        if [ -n "$SIGNING_IDENTITY" ]; then
          # Export with signing
          cat > build/ExportOptions.plist <<EOF
        <?xml version="1.0" encoding="UTF-8"?>
        <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
        <plist version="1.0">
        <dict>
            <key>method</key>
            <string>developer-id</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>signingCertificate</key>
            <string>Developer ID Application</string>
        </dict>
        </plist>
        EOF
        else
          # Export without signing
          cat > build/ExportOptions.plist <<EOF
        <?xml version="1.0" encoding="UTF-8"?>
        <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
        <plist version="1.0">
        <dict>
            <key>method</key>
            <string>mac-application</string>
            <key>signingStyle</key>
            <string>manual</string>
        </dict>
        </plist>
        EOF
        fi

        # Export the app
        xcodebuild \
          -exportArchive \
          -archivePath build/Flycut.xcarchive \
          -exportPath build/Export \
          -exportOptionsPlist build/ExportOptions.plist

    - name: Verify Export
      run: |
        echo "Checking build directory structure:"
        ls -la build/
        echo ""
        echo "Checking archive contents:"
        ls -la build/Flycut.xcarchive/ || true
        ls -la build/Flycut.xcarchive/Products/ || true
        ls -la build/Flycut.xcarchive/Products/Applications/ || true
        echo ""
        echo "Checking export directory:"
        ls -la build/Export/ || true
        echo ""
        echo "Looking for .app bundles:"
        find build -name "*.app" -type d

    - name: Notarize App
      if: steps.check_secrets.outputs.has_certs == 'true' && steps.check_secrets.outputs.has_notarization == 'true'
      env:
        NOTARIZATION_USERNAME: ${{ secrets.NOTARIZATION_USERNAME }}
        NOTARIZATION_PASSWORD: ${{ secrets.NOTARIZATION_PASSWORD }}
        NOTARIZATION_TEAM_ID: ${{ secrets.NOTARIZATION_TEAM_ID }}
      run: |
        # Find the app bundle
        APP_PATH=$(find build -name "Flycut.app" -type d | head -1)

        if [ -z "$APP_PATH" ]; then
          echo "Error: Could not find Flycut.app for notarization"
          exit 1
        fi

        echo "Notarizing app at: $APP_PATH"
        xcrun notarytool submit "$APP_PATH" \
          --apple-id "$NOTARIZATION_USERNAME" \
          --password "$NOTARIZATION_PASSWORD" \
          --team-id "$NOTARIZATION_TEAM_ID" \
          --wait

        echo "Stapling notarization ticket..."
        xcrun stapler staple "$APP_PATH"

    - name: Create DMG
      run: |
        # Ensure build directory exists first
        mkdir -p build

        # Verify hdiutil is available
        if ! command -v hdiutil &> /dev/null; then
          echo "Warning: hdiutil command not found in PATH"
          echo "Installing create-dmg as alternative..."
          brew install create-dmg
        else
          echo "hdiutil is available at: $(which hdiutil)"
          hdiutil help create 2>&1 | head -5 || true
        fi

        # Find the app bundle
        APP_PATH=$(find build -name "Flycut.app" -type d | head -1)

        if [ -z "$APP_PATH" ]; then
          echo "Error: Could not find Flycut.app"
          echo "Build directory contents:"
          find build -type d
          exit 1
        fi

        echo "Found app at: $APP_PATH"

        # Create a staging directory for DMG contents
        mkdir -p build/dmg-staging

        # Copy the app to staging
        echo "Copying app to staging directory..."
        cp -R "$APP_PATH" build/dmg-staging/

        # Verify copy
        if [ ! -d "build/dmg-staging/Flycut.app" ]; then
          echo "Error: Failed to copy app to staging directory"
          ls -la build/dmg-staging/
          exit 1
        fi

        # Create a symbolic link to Applications folder
        ln -s /Applications build/dmg-staging/Applications

        # Verify staging directory contents before creating DMG
        echo "Staging directory contents:"
        ls -la build/dmg-staging/

        # Create the DMG
        DMG_NAME="Flycut.dmg"

        # Use absolute paths
        WORKSPACE_DIR="$(pwd)"
        SOURCE_DIR="${WORKSPACE_DIR}/build/dmg-staging"
        DMG_PATH="${WORKSPACE_DIR}/build/${DMG_NAME}"

        echo "Creating DMG: $DMG_NAME"
        echo "Working directory: $WORKSPACE_DIR"
        echo "Source folder: $SOURCE_DIR"
        echo "Destination: $DMG_PATH"

        # Verify source folder exists
        if [ ! -d "$SOURCE_DIR" ]; then
          echo "Error: Source folder $SOURCE_DIR does not exist"
          exit 1
        fi

        # Create DMG with absolute paths
        echo "Running hdiutil..."
        hdiutil create \
          -volname "Flycut" \
          -srcfolder "$SOURCE_DIR" \
          -ov \
          -format UDZO \
          "$DMG_PATH" || {
            echo "hdiutil failed with exit code $?"
            echo "Trying alternative approach with create-dmg..."
            brew install create-dmg
            create-dmg \
              --volname "Flycut" \
              --window-pos 200 120 \
              --window-size 800 400 \
              --icon-size 100 \
              --app-drop-link 600 185 \
              "$DMG_PATH" \
              "$SOURCE_DIR"
          }

        # Sign the DMG if we have a signing identity
        if [ -n "$SIGNING_IDENTITY" ]; then
          echo "Signing DMG..."
          codesign --force --sign "$SIGNING_IDENTITY" "$DMG_PATH"
        fi

        # Verify DMG was created
        if [ -f "$DMG_PATH" ]; then
          echo "DMG created successfully!"
          ls -lh "$DMG_PATH"
          echo "dmg_name=$DMG_NAME" >> $GITHUB_OUTPUT
        else
          echo "Error: DMG file not found at $DMG_PATH"
          echo "Searching for DMG files..."
          find . -name "*.dmg" -type f
          exit 1
        fi
      id: create_dmg

    - name: Clean up keychain
      if: always() && steps.check_secrets.outputs.has_certs == 'true'
      run: |
        KEYCHAIN_PATH=$RUNNER_TEMP/build.keychain
        security delete-keychain "$KEYCHAIN_PATH" || true

    - name: Generate Release Notes
      id: release_notes
      run: |
        # Get commits since last tag
        PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")

        if [ -z "$PREV_TAG" ]; then
          # First release, get all commits
          COMMITS=$(git log --pretty=format:"- %s (%h)" --reverse)
        else
          # Get commits since previous tag
          COMMITS=$(git log ${PREV_TAG}..HEAD --pretty=format:"- %s (%h)" --reverse)
        fi

        # Determine if signed
        SIGNED_STATUS="unsigned"
        if [ -n "$SIGNING_IDENTITY" ]; then
          SIGNED_STATUS="signed and notarized"
        fi

        # Create release notes
        cat > release_notes.md <<EOF
        ## Changes in this release

        $COMMITS

        ## Installation

        1. Download the DMG file below
        2. Open the DMG
        3. Drag Flycut.app to your Applications folder
        4. Launch Flycut from Applications

        ## Build Information

        - Build type: $SIGNED_STATUS
        - macOS compatibility: 10.13 or later

        ## Requirements

        - macOS 10.13 or later
        EOF

        cat release_notes.md

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v1
      with:
        files: build/Flycut.dmg
        body_path: release_notes.md
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Upload Build Artifacts
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: build-artifacts
        path: |
          build/
          !build/dmg-staging/
        retention-days: 7
